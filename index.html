<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Défis de Pat - Arcade Edition</title>
    <!-- Importation des polices rétro de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <!-- Liaison avec le fichier de style CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Boîte principale de la borne d'arcade -->
    <div class="arcade-container">
        <!-- Titre principal avec animation lumineuse -->
        <h1 class="neon-title">LES DÉFIS DE PAT</h1>
        
        <!-- Grille verticale contenant tous les boutons d'accès aux jeux -->
        <div class="menu-grid">
            <a href="https://patrom11.github.io/Defi1-pat/" class="menu-item neon-blue">
                <span>DÉFI 1</span>
            </a>
            <a href="https://patrom11.github.io/Defi2-pat/" class="menu-item neon-pink">
                <span>DÉFI 2</span>
            </a>
            <a href="https://patrom11.github.io/Defi3-pat/" class="menu-item neon-green">
                <span>DÉFI 3</span>
            </a>
            <!-- Intégration du Défi 4 sans altération du reste de la structure -->
            <a href="https://patrom11.github.io/Defi4-Patroid/" class="menu-item neon-yellow">
                <span>DÉFI 4</span>
            </a>
        </div>

        <!-- Texte clignotant décoratif style salle d'arcade -->
        <div class="insert-coin">INSERT COIN TO PLAY</div>
    </div>
</body>
</html>
